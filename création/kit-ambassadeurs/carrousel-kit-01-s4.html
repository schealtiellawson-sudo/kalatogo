<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOZALI — Carrousel Kit 01 S4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      background: #14100A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist', 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(ellipse at center, rgba(232,148,10,0.09) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .bar-left {
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 100%;
      background: #E8940A;
    }

    .slide-num {
      position: absolute;
      top: 52px;
      right: 60px;
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 18px;
      letter-spacing: 0.1em;
      color: rgba(232,148,10,0.45);
    }

    .logo {
      position: absolute;
      top: 52px;
      left: 52px;
      display: flex;
      align-items: baseline;
      opacity: 0.75;
    }

    .logo-w {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 32px;
      color: #E8940A;
      line-height: 1;
    }

    .logo-ozali {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #FCE0A8;
      line-height: 1;
      margin-left: 2px;
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 140px 90px 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      width: 100%;
    }

    /* Grand numero fond */
    .step-number {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 200px;
      line-height: 0.9;
      color: rgba(232,148,10,0.08);
      position: absolute;
      right: 60px;
      top: 120px;
      user-select: none;
    }

    .step-label {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 17px;
      letter-spacing: 0.22em;
      color: #E8940A;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .line {
      width: 60px;
      height: 3px;
      background: #E8940A;
      margin-bottom: 52px;
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 80px;
      line-height: 1.08;
      color: #FCE0A8;
      margin-bottom: 44px;
      max-width: 820px;
    }

    .description {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 30px;
      font-weight: 400;
      color: rgba(252,224,168,0.65);
      line-height: 1.55;
      max-width: 720px;
      border-left: 3px solid rgba(232,148,10,0.35);
      padding-left: 28px;
    }

    /* Bouton CTA or en bas */
    .cta-wrap {
      position: absolute;
      bottom: 80px;
      left: 90px;
      right: 90px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      background: #E8940A;
      color: #14100A;
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 22px 48px;
    }

    .cta-btn .arrow {
      font-size: 28px;
    }
  </style>
</head>
<body>

  <div class="bar-left"></div>
  <div class="glow"></div>

  <div class="logo">
    <span class="logo-w">W</span>
    <span class="logo-ozali">OZALI</span>
  </div>

  <div class="slide-num">04</div>

  <div class="content">
    <div class="step-number">4</div>
    <div class="step-label">Etape 03</div>
    <div class="line"></div>
    <h2 class="headline">Tu les contactes directement.</h2>
    <p class="description">WhatsApp, appel, message. Pas d'intermediaire. Pas d'attente.</p>
  </div>

  <!-- CTA bouton or -->
  <div class="cta-wrap">
    <div class="cta-btn">
      Commence maintenant <span class="arrow">→</span> Lien en bio
    </div>
  </div>

</body>
</html>
