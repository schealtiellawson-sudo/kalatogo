<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOZALI — Carrousel Kit 01 S1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      background: #14100A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist', 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 900px;
      height: 900px;
      background: radial-gradient(ellipse at center, rgba(232,148,10,0.07) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .bar-left {
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 100%;
      background: #E8940A;
    }

    /* Numero slide haut droite */
    .slide-num {
      position: absolute;
      top: 52px;
      right: 60px;
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 18px;
      letter-spacing: 0.1em;
      color: rgba(232,148,10,0.45);
    }

    /* Logo haut gauche */
    .logo {
      position: absolute;
      top: 52px;
      left: 52px;
      display: flex;
      align-items: baseline;
      opacity: 0.85;
    }

    .logo-w {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 32px;
      color: #E8940A;
      line-height: 1;
    }

    .logo-ozali {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #FCE0A8;
      line-height: 1;
      margin-left: 2px;
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 140px 90px 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 17px;
      letter-spacing: 0.2em;
      color: rgba(232,148,10,0.6);
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .line {
      width: 60px;
      height: 3px;
      background: #E8940A;
      margin-bottom: 48px;
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 86px;
      line-height: 1.08;
      color: #FCE0A8;
      margin-bottom: 48px;
      max-width: 860px;
    }

    .subline {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 28px;
      letter-spacing: 0.12em;
      color: #E8940A;
    }
  </style>
</head>
<body>

  <div class="bar-left"></div>
  <div class="glow"></div>

  <div class="logo">
    <span class="logo-w">W</span>
    <span class="logo-ozali">OZALI</span>
  </div>

  <div class="slide-num">01</div>

  <div class="content">
    <div class="eyebrow">Guide pratique</div>
    <div class="line"></div>
    <h1 class="headline">Comment trouver un artisan fiable au Togo et au Benin.</h1>
    <div class="subline">4 etapes.</div>
  </div>

</body>
</html>
