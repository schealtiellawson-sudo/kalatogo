<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOZALI — Story Kit 02 Avant Apres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      background: #14100A;
      font-family: 'Geist', 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Logo discret haut gauche */
    .logo {
      position: absolute;
      top: 72px;
      left: 64px;
      display: flex;
      align-items: baseline;
      opacity: 0.75;
      z-index: 20;
    }

    .logo-w {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 34px;
      color: #E8940A;
      line-height: 1;
    }

    .logo-ozali {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #FCE0A8;
      line-height: 1;
      margin-left: 3px;
    }

    /* MOITIE HAUT — fond tres sombre, AVANT */
    .panel-avant {
      flex: 1;
      background: #0D0A06;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 80px 80px;
      position: relative;
    }

    .label-avant {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 0.22em;
      color: rgba(180, 60, 60, 0.75);
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .avant-text {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 62px;
      line-height: 1.15;
      color: #FCE0A8;
      max-width: 820px;
    }

    /* Ligne or separatrice */
    .divider {
      height: 6px;
      background: #E8940A;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    /* MOITIE BAS — fond or, APRES */
    .panel-apres {
      flex: 1;
      background: #E8940A;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 80px 80px;
      position: relative;
    }

    .label-apres {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 0.22em;
      color: rgba(20,16,10,0.55);
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .apres-text {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 52px;
      font-weight: 600;
      line-height: 1.25;
      color: #14100A;
      max-width: 820px;
    }

    .apres-text span {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-weight: 400;
    }

    /* CTA bande dark en bas */
    .cta-strip {
      background: #14100A;
      padding: 36px 80px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .cta-strip-text {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 28px;
      letter-spacing: 0.08em;
      color: #E8940A;
    }

    .cta-strip-arrow {
      font-size: 32px;
      color: #E8940A;
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <div class="logo">
    <span class="logo-w">W</span>
    <span class="logo-ozali">OZALI</span>
  </div>

  <!-- Panel AVANT -->
  <div class="panel-avant">
    <div class="label-avant">Avant</div>
    <p class="avant-text">Chercher un artisan : demander a 10 personnes, attendre, esperer.</p>
  </div>

  <!-- Separateur or -->
  <div class="divider"></div>

  <!-- Panel APRES -->
  <div class="panel-apres">
    <div class="label-apres">Apres</div>
    <p class="apres-text"><span>WOZALI :</span> tu cherches ton metier, tu choisis, tu contactes.</p>
  </div>

  <!-- CTA strip dark -->
  <div class="cta-strip">
    <span class="cta-strip-text">Lien en bio</span>
    <span class="cta-strip-arrow">→</span>
  </div>

</body>
</html>
