<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOZALI — Post Kit 01 Douleur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      background: #14100A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist', 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Glow radial subtil */
    .glow {
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse at center, rgba(232,148,10,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Barre or gauche */
    .bar-left {
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 100%;
      background: #E8940A;
    }

    /* Logo W haut gauche */
    .logo {
      position: absolute;
      top: 52px;
      left: 52px;
      display: flex;
      align-items: baseline;
      gap: 0;
      opacity: 0.9;
    }

    .logo-w {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 32px;
      color: #E8940A;
      line-height: 1;
    }

    .logo-ozali {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #FCE0A8;
      line-height: 1;
      margin-left: 2px;
    }

    /* Contenu central */
    .content {
      position: relative;
      z-index: 10;
      padding: 80px 90px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 18px;
      letter-spacing: 0.18em;
      color: #E8940A;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 88px;
      line-height: 1.08;
      color: #FCE0A8;
      margin-bottom: 52px;
      max-width: 820px;
    }

    .subtitle {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 400;
      color: #E8940A;
      line-height: 1.5;
      max-width: 700px;
      margin-bottom: auto;
    }

    /* CTA bas */
    .cta-row {
      position: absolute;
      bottom: 64px;
      left: 90px;
      right: 90px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cta-text {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: #FCE0A8;
    }

    .cta-text span {
      color: #E8940A;
    }

    /* Ligne decorative */
    .line {
      width: 80px;
      height: 2px;
      background: #E8940A;
      margin-bottom: 52px;
    }
  </style>
</head>
<body>

  <div class="bar-left"></div>
  <div class="glow"></div>

  <!-- Logo -->
  <div class="logo">
    <span class="logo-w">W</span>
    <span class="logo-ozali">OZALI</span>
  </div>

  <!-- Contenu -->
  <div class="content">
    <div class="eyebrow">Togo &amp; Benin</div>

    <div class="line"></div>

    <h1 class="headline">T'as deja cherche un bon plombier au Togo ?</h1>

    <p class="subtitle">Et personne pouvait te donner un nom fiable.</p>
  </div>

  <!-- CTA bas -->
  <div class="cta-row">
    <span class="cta-text">La solution <span>→ lien en bio</span></span>
  </div>

</body>
</html>
