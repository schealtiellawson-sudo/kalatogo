<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOZALI — Story Kit 01 Curiosite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      background: #0D0A06;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist', 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Glow tres subtil centre */
    .glow {
      position: absolute;
      width: 900px;
      height: 900px;
      background: radial-gradient(ellipse at center, rgba(232,148,10,0.06) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      pointer-events: none;
    }

    /* Barre or gauche fine */
    .bar-left {
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, transparent 0%, #E8940A 20%, #E8940A 80%, transparent 100%);
    }

    /* Logo discret haut gauche */
    .logo {
      position: absolute;
      top: 80px;
      left: 60px;
      display: flex;
      align-items: baseline;
      opacity: 0.7;
    }

    .logo-w {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 36px;
      color: #E8940A;
      line-height: 1;
    }

    .logo-ozali {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #FCE0A8;
      line-height: 1;
      margin-left: 3px;
    }

    /* Contenu central */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 100px;
      gap: 0;
    }

    .line-1 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 90px;
      line-height: 1.1;
      color: #FCE0A8;
      margin-bottom: 64px;
      max-width: 780px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.2s;
    }

    .line-2 {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 48px;
      font-weight: 500;
      color: #E8940A;
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.8s;
    }

    .line-3 {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 400;
      color: #FCE0A8;
      line-height: 1.5;
      max-width: 680px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 1.5s;
    }

    /* CTA tout en bas */
    .cta {
      position: absolute;
      bottom: 100px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 26px;
      letter-spacing: 0.12em;
      color: #E8940A;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Separateur */
    .sep {
      width: 48px;
      height: 2px;
      background: #E8940A;
      margin: 0 auto 56px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 1.1s;
    }
  </style>
</head>
<body>

  <div class="bar-left"></div>
  <div class="glow"></div>

  <div class="logo">
    <span class="logo-w">W</span>
    <span class="logo-ozali">OZALI</span>
  </div>

  <div class="content">
    <p class="line-1">Il y a des artisans incroyables au Togo et au Benin.</p>
    <div class="sep"></div>
    <p class="line-2">Personne les trouve.</p>
    <p class="line-3">J'ai trouve l'appli qui change ca.</p>
  </div>

  <div class="cta">Le lien est en bio.</div>

</body>
</html>
