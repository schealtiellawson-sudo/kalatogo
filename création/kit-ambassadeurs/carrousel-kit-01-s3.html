<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOZALI — Carrousel Kit 01 S3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      background: #E8940A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist', 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Texture subtile */
    .texture {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.025) 2px,
        rgba(0,0,0,0.025) 4px
      );
      pointer-events: none;
    }

    .slide-num {
      position: absolute;
      top: 52px;
      right: 60px;
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 18px;
      letter-spacing: 0.1em;
      color: rgba(20,16,10,0.35);
    }

    .logo {
      position: absolute;
      top: 52px;
      left: 52px;
      display: flex;
      align-items: baseline;
      opacity: 0.65;
    }

    .logo-w {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 32px;
      color: #14100A;
      line-height: 1;
    }

    .logo-ozali {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #14100A;
      line-height: 1;
      margin-left: 2px;
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 140px 90px 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      width: 100%;
    }

    /* Grand numero fond */
    .step-number {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 200px;
      line-height: 0.9;
      color: rgba(20,16,10,0.08);
      position: absolute;
      right: 60px;
      top: 120px;
      user-select: none;
    }

    .step-label {
      font-family: 'Geist Mono', 'Courier New', monospace;
      font-size: 17px;
      letter-spacing: 0.22em;
      color: rgba(20,16,10,0.55);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .line {
      width: 60px;
      height: 4px;
      background: #14100A;
      margin-bottom: 52px;
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 68px;
      line-height: 1.1;
      color: #14100A;
      margin-bottom: 44px;
      max-width: 820px;
    }

    .description {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 30px;
      font-weight: 500;
      color: rgba(20,16,10,0.75);
      line-height: 1.55;
      max-width: 740px;
      border-left: 3px solid rgba(20,16,10,0.3);
      padding-left: 28px;
    }
  </style>
</head>
<body>

  <div class="texture"></div>

  <div class="logo">
    <span class="logo-w">W</span>
    <span class="logo-ozali">OZALI</span>
  </div>

  <div class="slide-num">03</div>

  <div class="content">
    <div class="step-number">3</div>
    <div class="step-label">Etape 02</div>
    <div class="line"></div>
    <h2 class="headline">Tu vois les profils verifies, les avis, les photos de leurs realisations.</h2>
    <p class="description">Pas de surprise. Tu sais exactement a qui tu as affaire avant de contacter.</p>
  </div>

</body>
</html>
