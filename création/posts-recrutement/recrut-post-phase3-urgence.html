<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1080px; height: 1080px;
  background: #14100A;
  font-family: 'Geist', sans-serif;
  overflow: hidden;
  position: relative;
}
.glow {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 700px;
  background: radial-gradient(ellipse at center, rgba(232,148,10,0.09) 0%, transparent 60%);
  pointer-events: none;
}
.barre { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #E8940A; }

.inner {
  position: absolute; inset: 0;
  padding: 80px 80px 72px 96px;
  display: flex; flex-direction: column; justify-content: space-between;
}

.eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(232,148,10,0.5);
  margin-bottom: 32px;
}

.titre {
  font-family: 'DM Serif Display', serif;
  font-size: 88px; line-height: 1.05;
  color: #FCE0A8;
  margin-bottom: 48px;
}
.titre em { font-style: italic; color: #E8940A; }

/* COUNTDOWN */
.countdown {
  display: flex; gap: 20px; align-items: stretch;
  margin-bottom: 48px;
}
.cd-block {
  flex: 1;
  background: rgba(232,148,10,0.07);
  border: 1px solid rgba(232,148,10,0.2);
  border-radius: 16px;
  padding: 24px 20px;
  text-align: center;
}
.cd-n {
  font-family: 'DM Serif Display', serif;
  font-size: 64px; color: #E8940A; line-height: 1;
}
.cd-l {
  font-family: 'Geist Mono', monospace;
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(252,224,168,0.35); margin-top: 6px;
}
.cd-sep {
  font-family: 'DM Serif Display', serif;
  font-size: 48px; color: rgba(232,148,10,0.3);
  align-self: center; margin-top: -12px;
}

/* PLACES */
.places-bloc {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(232,148,10,0.06);
  border: 1.5px solid rgba(232,148,10,0.25);
  border-radius: 16px;
  padding: 28px 36px;
  margin-bottom: 48px;
}
.places-n {
  font-family: 'DM Serif Display', serif;
  font-size: 80px; color: #E8940A; line-height: 1;
}
.places-l {
  font-size: 24px; color: rgba(252,224,168,0.65); line-height: 1.5; text-align: right;
}
.places-l strong { color: #FCE0A8; font-weight: 700; }

/* BOTTOM */
.bottom { display: flex; align-items: center; justify-content: space-between; }
.cta-main {
  background: #E8940A; color: #1A1208;
  border-radius: 14px; padding: 20px 40px;
  font-size: 22px; font-weight: 700;
  letter-spacing: 0.02em;
}
.cta-url {
  font-family: 'Geist Mono', monospace;
  font-size: 16px; color: rgba(232,148,10,0.4);
  letter-spacing: 0.08em;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="barre"></div>
<div class="inner">

  <div class="eyebrow">Agents terrain WOZALI · Lomé et Cotonou · 2026</div>

  <div class="titre">Il reste<br><em>des places.</em><br>Pas longtemps.</div>

  <div class="countdown">
    <div class="cd-block">
      <div class="cd-n">35</div>
      <div class="cd-l">jours</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <div class="cd-n">1er</div>
      <div class="cd-l">juillet</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <div class="cd-n">20</div>
      <div class="cd-l">places max</div>
    </div>
  </div>

  <div class="places-bloc">
    <div class="places-n">100K</div>
    <div class="places-l"><strong>FCFA par mois.</strong><br>100 Pro actifs × 1 000 FCFA.<br>Ton quartier. Ton téléphone.</div>
  </div>

  <div class="bottom">
    <div class="cta-main">Postuler maintenant →</div>
    <div class="cta-url">wozali.africa/postuler</div>
  </div>

</div>
</body>
</html>
