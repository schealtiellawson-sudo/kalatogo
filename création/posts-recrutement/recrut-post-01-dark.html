<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1080px;
  height: 1080px;
  background: #14100A;
  font-family: 'Geist', sans-serif;
  overflow: hidden;
  position: relative;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

/* Glow */
.glow {
  position: absolute;
  top: -200px;
  left: -200px;
  width: 900px;
  height: 900px;
  background: radial-gradient(ellipse at center, rgba(232,148,10,0.07) 0%, transparent 65%);
  pointer-events: none;
}

/* Barre or gauche */
.barre {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 6px;
  background: #E8940A;
}

/* Layout */
.inner {
  position: absolute;
  inset: 0;
  padding: 80px 80px 72px 92px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Top */
.top { display: flex; flex-direction: column; }
.eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #E8940A;
  opacity: 0.75;
  margin-bottom: 36px;
}
.titre {
  font-family: 'DM Serif Display', serif;
  font-size: 88px;
  line-height: 1.0;
  color: #FCE0A8;
  max-width: 840px;
}
.titre em {
  font-style: italic;
  color: #E8940A;
}

/* Middle */
.stat-bloc {
  display: flex;
  align-items: center;
  gap: 28px;
  border-left: 4px solid rgba(232,148,10,0.4);
  padding-left: 28px;
  margin-top: 48px;
}
.stat-n {
  font-family: 'Geist Mono', monospace;
  font-size: 72px;
  font-weight: 700;
  color: #E8940A;
  line-height: 1;
}
.stat-l {
  font-family: 'Geist', sans-serif;
  font-size: 26px;
  color: rgba(252,224,168,0.6);
  line-height: 1.4;
  max-width: 380px;
}

/* Bottom */
.bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: baseline;
  gap: 3px;
}
.logo-w {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 52px;
  color: #E8940A;
  line-height: 1;
}
.logo-o {
  font-family: 'Geist', sans-serif;
  font-weight: 500;
  font-size: 28px;
  color: #FCE0A8;
}
.domain {
  font-family: 'Geist Mono', monospace;
  font-size: 20px;
  color: rgba(252,224,168,0.25);
  letter-spacing: 0.08em;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="barre"></div>
<div class="inner">
  <div class="top">
    <div class="eyebrow">Lomé · Cotonou · Afrique de l'Ouest</div>
    <div class="titre">Ils travaillent<br>depuis des<br><em>générations.</em><br>Invisibles.</div>
    <div class="stat-bloc">
      <div class="stat-n">80%</div>
      <div class="stat-l">de l'économie est informelle.<br>Zéro visibilité en ligne.</div>
    </div>
  </div>
  <div class="bottom">
    <div class="logo">
      <span class="logo-w">W</span><span class="logo-o">OZALI</span>
    </div>
    <div class="domain">wozali.africa</div>
  </div>
</div>
</body>
</html>
