<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1080px; height: 1080px;
  background: #14100A;
  font-family: 'Geist', sans-serif;
  overflow: hidden;
  position: relative;
}
.glow {
  position: absolute;
  top: -160px; right: -160px;
  width: 800px; height: 800px;
  background: radial-gradient(ellipse at center, rgba(232,148,10,0.08) 0%, transparent 65%);
  pointer-events: none;
}
.barre {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 6px;
  background: #E8940A;
}
.inner {
  position: absolute;
  inset: 0;
  padding: 80px 88px 72px 100px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #E8940A;
  opacity: 0.75;
  margin-bottom: 44px;
}
.titre {
  font-family: 'DM Serif Display', serif;
  font-size: 76px;
  line-height: 1.08;
  color: #FCE0A8;
}
.titre em { font-style: italic; color: #E8940A; }

.body-bloc {
  border-left: 4px solid rgba(232,148,10,0.35);
  padding-left: 32px;
  margin-top: 52px;
}
.body-text {
  font-size: 26px;
  color: rgba(252,224,168,0.65);
  line-height: 1.65;
  margin-bottom: 24px;
}
.highlight {
  font-family: 'Geist Mono', monospace;
  font-size: 30px;
  font-weight: 700;
  color: #E8940A;
  letter-spacing: 0.02em;
}

.bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.logo { display: flex; align-items: baseline; gap: 3px; }
.logo-w { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 52px; color: #E8940A; line-height: 1; }
.logo-o { font-family: 'Geist', sans-serif; font-weight: 500; font-size: 28px; color: #FCE0A8; }
.cta {
  font-family: 'Geist', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #14100A;
  background: #E8940A;
  padding: 16px 32px;
  border-radius: 50px;
  letter-spacing: 0.02em;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="barre"></div>
<div class="inner">
  <div>
    <div class="eyebrow">WOZALI RECRUTE · LOMÉ &amp; COTONOU</div>
    <div class="titre">Kofi connaît 40 artisans<br>dans son quartier.<br>Aucun n'a de profil<br><em>en ligne.</em></div>
    <div class="body-bloc">
      <div class="body-text">Il va inscrire les premiers membres de WOZALI<br>sur le terrain. Et être payé pour.</div>
      <div class="highlight">100 000 FCFA le 2e mois · 20 places</div>
    </div>
  </div>
  <div class="bottom">
    <div class="logo">
      <span class="logo-w">W</span><span class="logo-o">OZALI</span>
    </div>
    <div class="cta">Lien en bio → Postuler</div>
  </div>
</div>
</body>
</html>
