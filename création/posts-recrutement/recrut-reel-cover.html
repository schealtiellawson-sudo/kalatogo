<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1080px; height: 1920px;
  background: #14100A;
  font-family: 'Geist', sans-serif;
  overflow: hidden;
  position: relative;
}
.glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 1100px; height: 1100px;
  background: radial-gradient(ellipse at center, rgba(232,148,10,0.12) 0%, transparent 60%);
  pointer-events: none;
}
.barre { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #E8940A; }

.inner {
  position: absolute; inset: 0;
  padding: 100px 88px 96px 100px;
  display: flex; flex-direction: column; justify-content: space-between;
}

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: baseline; gap: 3px; }
.logo-w { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 52px; color: #E8940A; line-height: 1; }
.logo-o { font-family: 'Geist', sans-serif; font-weight: 500; font-size: 28px; color: #FCE0A8; }
.eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 18px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(232,148,10,0.65);
}

/* CENTRE */
.centre {
  display: flex; flex-direction: column; align-items: flex-start;
  gap: 56px;
}

/* PLAY BUTTON */
.play {
  width: 120px; height: 120px;
  border: 2.5px solid #E8940A;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.play-tri {
  width: 0; height: 0;
  border-style: solid;
  border-width: 28px 0 28px 48px;
  border-color: transparent transparent transparent #E8940A;
  margin-left: 8px;
}

.hook {
  font-family: 'DM Serif Display', serif;
  font-size: 96px; line-height: 1.05;
  color: #FCE0A8;
}
.hook em { font-style: italic; color: #E8940A; }

/* BOTTOM */
.bottom { display: flex; flex-direction: column; gap: 24px; }
.tag-row { display: flex; gap: 14px; flex-wrap: wrap; }
.tag {
  font-family: 'Geist Mono', monospace;
  font-size: 20px; letter-spacing: 0.08em;
  background: rgba(232,148,10,0.1);
  border: 1px solid rgba(232,148,10,0.25);
  color: #E8940A;
  padding: 10px 22px; border-radius: 30px;
}
.domain {
  font-family: 'Geist Mono', monospace;
  font-size: 22px; color: rgba(252,224,168,0.2);
  letter-spacing: 0.08em;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="barre"></div>
<div class="inner">

  <div class="header">
    <div class="logo"><span class="logo-w">W</span><span class="logo-o">OZALI</span></div>
    <div class="eyebrow">Recrutement Pionniers</div>
  </div>

  <div class="centre">
    <div class="play"><div class="play-tri"></div></div>
    <div class="hook">T'as un réseau<br>dans ton<br>quartier ?<br><em>Écoute bien.</em></div>
  </div>

  <div class="bottom">
    <div class="tag-row">
      <span class="tag">Lomé</span>
      <span class="tag">Cotonou</span>
      <span class="tag">100K FCFA · 2e mois</span>
      <span class="tag">20 places</span>
    </div>
    <div class="domain">wozali.vercel.app/postuler</div>
  </div>

</div>
</body>
</html>
