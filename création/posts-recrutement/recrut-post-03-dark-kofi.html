<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1080px;
  height: 1080px;
  background: #14100A;
  font-family: 'Geist', sans-serif;
  overflow: hidden;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

.glow {
  position: absolute;
  top: 300px; right: -300px;
  width: 800px; height: 800px;
  background: radial-gradient(ellipse, rgba(232,148,10,0.06) 0%, transparent 65%);
}
.barre { position:absolute; left:0; top:0; bottom:0; width:6px; background:#E8940A; }

.inner {
  position: absolute;
  inset: 0;
  padding: 80px 80px 72px 92px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.ville {
  font-family: 'Geist Mono', monospace;
  font-size: 20px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #E8940A;
  opacity: 0.65;
  margin-bottom: 20px;
}

.nom {
  font-family: 'DM Serif Display', serif;
  font-size: 120px;
  color: #FCE0A8;
  line-height: 0.9;
  margin-bottom: 20px;
}

.metier {
  font-family: 'Geist Mono', monospace;
  font-size: 22px;
  color: #E8940A;
  letter-spacing: 0.08em;
  margin-bottom: 48px;
}

.quote-block {
  border-left: 5px solid #E8940A;
  padding: 24px 32px;
  background: rgba(232,148,10,0.05);
  border-radius: 0 12px 12px 0;
  max-width: 820px;
}
.quote {
  font-family: 'DM Serif Display', serif;
  font-size: 38px;
  line-height: 1.35;
  color: #FCE0A8;
  font-style: italic;
}
.quote-detail {
  font-family: 'Geist', sans-serif;
  font-size: 22px;
  color: rgba(252,224,168,0.55);
  margin-top: 16px;
  line-height: 1.5;
}

.bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.logo-w { font-family:'DM Serif Display',serif; font-style:italic; font-size:52px; color:#E8940A; }
.logo-o { font-family:'Geist',sans-serif; font-weight:500; font-size:28px; color:#FCE0A8; }
.tag {
  font-family: 'Geist', sans-serif;
  font-size: 20px;
  font-weight: 600;
  color: #E8940A;
  background: rgba(232,148,10,0.1);
  border: 1px solid rgba(232,148,10,0.3);
  border-radius: 8px;
  padding: 10px 20px;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="barre"></div>
<div class="inner">
  <div>
    <div class="ville">📍 Hédzranawoé · Lomé · Togo</div>
    <div class="nom">Kofi.</div>
    <div class="metier">Électricien · 12 ans de métier</div>
    <div class="quote-block">
      <div class="quote">"Ses clients dans son quartier ne jurent que par lui. En dehors de son quartier, personne ne peut le trouver."</div>
      <div class="quote-detail">L'argent circule dans sa ville.<br>Juste pas jusqu'à lui.</div>
    </div>
  </div>
  <div class="bottom">
    <div style="display:flex;align-items:baseline;gap:3px;">
      <span class="logo-w">W</span><span class="logo-o">OZALI</span>
    </div>
    <div class="tag">Ça change le 1er juillet →</div>
  </div>
</div>
</body>
</html>
