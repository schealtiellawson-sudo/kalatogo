<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1080px; height: 1080px;
  background: #14100A;
  font-family: 'Geist', sans-serif;
  overflow: hidden;
  position: relative;
}

/* Barre or gauche */
.barre { position: absolute; left: 0; top: 0; bottom: 0; width: 10px; background: #E8940A; }

/* Glow */
.glow {
  position: absolute; top: 0; left: 0; right: 0;
  height: 500px;
  background: radial-gradient(ellipse at 50% 0%, rgba(232,148,10,0.12) 0%, transparent 65%);
  pointer-events: none;
}

.inner {
  position: absolute; inset: 0;
  padding: 90px 90px 90px 110px;
  display: flex; flex-direction: column; justify-content: space-between;
}

/* EYEBROW */
.eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 20px; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(232,148,10,0.5);
  margin-bottom: 36px;
}

/* MONTANT HERO */
.montant {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 180px; line-height: 0.9;
  color: #E8940A;
  margin-bottom: 16px;
}
.montant-unit {
  font-family: 'Geist', sans-serif;
  font-style: normal;
  font-size: 36px; font-weight: 700;
  color: rgba(232,148,10,0.7);
  letter-spacing: 0.04em;
  margin-bottom: 48px;
}

/* CORPS */
.corps {
  font-size: 32px;
  font-weight: 500;
  color: #FCE0A8;
  line-height: 1.65;
  margin-bottom: 56px;
}
.corps strong { color: #E8940A; font-weight: 700; }

/* CTA */
.cta-bloc {
  display: flex; align-items: center; justify-content: space-between;
  background: #E8940A;
  border-radius: 18px;
  padding: 30px 44px;
}
.cta-text {
  font-size: 30px; font-weight: 800;
  color: #1A1208;
  letter-spacing: 0.01em;
}
.cta-url {
  font-family: 'Geist Mono', monospace;
  font-size: 22px;
  color: rgba(26,18,8,0.6);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>
<div class="barre"></div>
<div class="glow"></div>
<div class="inner">

  <div class="eyebrow">Lomé et Cotonou · 20 places</div>

  <div>
    <div class="montant">100K</div>
    <div class="montant-unit">FCFA PAR MOIS</div>

    <div class="corps">
      Pas de diplôme. Pas d'expérience.<br>
      Pas d'âge minimum.<br>
      <strong>Tout le monde peut postuler.</strong><br>
      Lancement 1er août 2026.
    </div>
  </div>

  <div class="cta-bloc">
    <div class="cta-text">Clique sur le lien dans ce message</div>
  </div>

</div>
</body>
</html>
