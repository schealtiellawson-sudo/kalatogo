<!--
  Date de publication : J05 campagne suspense (avant 13 juillet 2026)
  Thème : "Ils sont prêts." — Tension. Les artisans existent, ils attendent. WOZALI non nommé.
  Life Force : LF3 (invisibilité). SB7 : artisans = héros qui attendent leur moment.
  Phase Sabri Suby : Avant Phase 1. JAMAIS mentionner WOZALI.
-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=0.5, maximum-scale=0.5">
  <title>WOZALI — Suspense J05</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #14100A;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Lignes or tension — haut et bas, minces */
    .line-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #E8940A;
      opacity: 0;
      animation: slideIn 0.8s ease forwards;
      animation-delay: 0.4s;
    }

    .line-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #E8940A;
      opacity: 0;
      animation: slideIn 0.8s ease forwards;
      animation-delay: 0.6s;
    }

    /* Logo discret haut gauche */
    .logo {
      position: absolute;
      top: 64px;
      left: 64px;
      display: flex;
      align-items: baseline;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.3s;
    }

    .logo-w {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 52px;
      color: #E8940A;
      line-height: 1;
      letter-spacing: -2px;
    }

    .logo-ozali {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      color: #FCE0A8;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-left: 4px;
      align-self: center;
    }

    /* Bloc texte */
    .text-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 56px;
      padding: 0 88px;
      text-align: center;
    }

    /* Ligne 1 — "Ils sont déjà prêts." */
    .line-1 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 108px;
      color: #FCE0A8;
      line-height: 1.05;
      letter-spacing: -3px;
      opacity: 0;
      animation: riseIn 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 1.0s;
    }

    /* Ligne 2 — "Toi, tu sais même pas encore." */
    .line-2 {
      font-family: 'Courier New', monospace;
      font-size: 40px;
      color: #E8940A;
      line-height: 1.4;
      letter-spacing: 0px;
      opacity: 0;
      animation: riseIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 2.2s;
    }

    /* Ligne 3 — "ca arrive." Geist Mono, très petit */
    .line-3 {
      font-family: 'Courier New', monospace;
      font-size: 24px;
      color: #FCE0A8;
      letter-spacing: 8px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInSlow 2s ease forwards;
      animation-delay: 3.8s;
    }

    /* Glow or discret au centre */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 148, 10, 0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInSlow {
      from { opacity: 0; }
      to   { opacity: 0.8; }
    }
  </style>
</head>
<body>

  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <div class="logo">
    <span class="logo-w">W</span>
    <span class="logo-ozali">OZALI</span>
  </div>

  <div class="glow"></div>

  <div class="text-block">
    <p class="line-1">Ils sont déjà prêts.</p>
    <p class="line-2">Toi, tu sais même pas encore.</p>
    <p class="line-3">ca arrive.</p>
  </div>

  <div class="vignette"></div>

</body>
</html>
