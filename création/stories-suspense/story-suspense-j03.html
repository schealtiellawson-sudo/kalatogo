<!--
  Date de publication : J03 campagne suspense (avant 13 juillet 2026)
  Thème : "Depuis des mois." — Révélation progressive, ambiance préparation secrète.
  Phase Sabri Suby : Avant Phase 1. Pas de mention WOZALI.
-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=0.5, maximum-scale=0.5">
  <title>WOZALI — Suspense J03</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #14100A;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Texture subtile via noise pseudo-element */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 30% 20%, rgba(232, 148, 10, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(232, 148, 10, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Logo discret en haut à gauche */
    .logo {
      position: absolute;
      top: 64px;
      left: 64px;
      display: flex;
      align-items: baseline;
      gap: 0px;
      opacity: 0;
      animation: fadeDown 1s ease forwards;
      animation-delay: 0.2s;
    }

    .logo-w {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 52px;
      color: #E8940A;
      line-height: 1;
      letter-spacing: -2px;
    }

    .logo-ozali {
      font-family: 'Courier New', monospace;
      font-style: normal;
      font-size: 20px;
      color: #FCE0A8;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-left: 4px;
      line-height: 1;
      align-self: center;
    }

    /* Bloc texte centré */
    .text-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 0 96px;
      text-align: center;
    }

    /* Ligne 1 — "Depuis des mois" */
    .line-1 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 112px;
      color: #E8940A;
      line-height: 1.0;
      letter-spacing: -3px;
      opacity: 0;
      animation: riseIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.8s;
    }

    /* Ligne 2 — "on prépare quelque chose." */
    .line-2 {
      font-family: 'Courier New', monospace;
      font-size: 42px;
      color: #FCE0A8;
      line-height: 1.4;
      letter-spacing: 0px;
      opacity: 0;
      animation: riseIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 1.8s;
    }

    /* Ligne 3 — "Au Togo. Au Bénin." */
    .line-3 {
      font-family: 'Courier New', monospace;
      font-size: 26px;
      color: #E8940A;
      letter-spacing: 6px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 3.2s;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="logo">
    <span class="logo-w">W</span>
    <span class="logo-ozali">OZALI</span>
  </div>

  <div class="text-block">
    <p class="line-1">Depuis des&nbsp;mois</p>
    <p class="line-2">on prépare quelque chose.</p>
    <p class="line-3">Au Togo. Au Bénin.</p>
  </div>

  <div class="vignette"></div>

</body>
</html>
