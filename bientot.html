<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WOZALI — 15 août 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#14100A;}
  body{font-family:'Geist',sans-serif;color:#FCE0A8;overflow:hidden;}
  .stage{position:fixed;inset:0;overflow:hidden;}

  /* colonnes défilantes */
  .cols{position:absolute;inset:0;display:flex;gap:18px;padding:0 16px;overflow:hidden;
        -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 14%,#000 86%,transparent 100%);
                mask-image:linear-gradient(180deg,transparent 0,#000 14%,#000 86%,transparent 100%);}
  .col{flex:1;overflow:hidden;position:relative;}
  .track{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:20px;will-change:transform;}
  @media(min-width:768px){.cols{gap:8vw;padding:0 6vw;}.track{gap:34px;}.job{font-size:clamp(20px,2.4vw,34px)!important;}}
  .track.up{animation:up linear infinite;}
  .track.down{animation:down linear infinite;}
  @keyframes up{0%{transform:translateY(0);}100%{transform:translateY(-50%);}}
  @keyframes down{0%{transform:translateY(-50%);}100%{transform:translateY(0);}}
  .job{font-family:'DM Serif Display',serif;font-style:italic;font-size:18px;line-height:1.05;text-align:center;opacity:.45;white-space:nowrap;}

  /* panneau central */
  .panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3;pointer-events:none;}
  .card{width:100%;max-width:430px;text-align:center;padding:36px 32px;
        background:rgba(14,11,7,.85);backdrop-filter:blur(3px);
        border-top:1px solid rgba(232,148,10,.28);border-bottom:1px solid rgba(232,148,10,.28);}
  @media(min-width:768px){.card{border-radius:24px;border:1px solid rgba(232,148,10,.28);box-shadow:0 20px 80px rgba(0,0,0,.55);}}

  /* logo WOZALI CSS */
  .logo{display:inline-block;position:relative;padding-bottom:10px;margin-bottom:4px;}
  .logo-w{font-family:'DM Serif Display',serif;font-style:italic;font-size:38px;color:#E8940A;line-height:1;}
  .logo-oz{font-family:'Geist',sans-serif;font-weight:600;font-size:27px;color:#FCE0A8;letter-spacing:.06em;vertical-align:bottom;margin-left:2px;line-height:1.12;}
  .logo-swoop{position:absolute;bottom:0;left:0;right:0;height:8px;overflow:visible;}
  .logo-swoop svg{width:100%;height:8px;}
  @media(min-width:768px){.logo-w{font-size:52px;}.logo-oz{font-size:37px;}}

  .tag{font-family:'DM Serif Display',serif;font-style:italic;font-size:22px;line-height:1.3;margin-top:18px;color:#FCE0A8;opacity:.9;}
  .tag span{color:#E8940A;font-style:normal;}
  @media(min-width:768px){.tag{font-size:30px;margin-top:22px;}}

  .cd{display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Geist Mono',monospace;margin-top:18px;}
  .cd b{font-size:26px;font-weight:700;color:#E8940A;line-height:1;}
  .cd b.sec{color:#FCE0A8;}
  .cd s{font-size:9px;letter-spacing:.14em;color:#FCE0A8;opacity:.45;text-transform:uppercase;text-decoration:none;}
  @media(min-width:768px){.cd b{font-size:38px;}.cd{gap:9px;margin-top:24px;}}

  /* footer tagline */
  .footer{position:absolute;left:0;right:0;bottom:0;z-index:4;display:flex;flex-direction:column;align-items:center;
          padding:18px 24px calc(30px + env(safe-area-inset-bottom));
          background:linear-gradient(0deg,#14100A 55%,rgba(20,16,10,0));}
  @media(min-width:768px){.footer{padding-bottom:44px;}}
  .footer-note{font-size:12px;color:rgba(252,224,168,.35);letter-spacing:.06em;text-transform:uppercase;font-family:'Geist Mono',monospace;}
</style>
</head>
<body>
<div class="stage">
  <div class="cols">
    <div class="col"><div class="track up" id="c1"></div></div>
    <div class="col"><div class="track down" id="c2"></div></div>
    <div class="col"><div class="track up" id="c3"></div></div>
  </div>

  <div class="panel">
    <div class="card">
      <div class="logo">
        <span class="logo-w">W</span><span class="logo-oz">OZALI</span>
        <div class="logo-swoop">
          <svg viewBox="0 0 160 8" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 6 C 40 1, 100 1, 158 5" stroke="#E8940A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="tag">Ton travail nourrit.<br><span>Pas ton réseau.</span></div>
      <div class="cd">
        <b id="dd">00</b><s>j</s>
        <b id="hh">00</b><s>h</s>
        <b id="mm">00</b><s>m</s>
        <b class="sec" id="ss">00</b><s>s</s>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-note">wozali.africa</div>
  </div>
</div>

<script>
var METIERS = ["Coiffeuse","Barbier","Esthéticienne","Nail Art","Maquilleuse","Tatoueur","Masseuse","Menuisier","Maçon","Électricien","Plombier","Peintre","Soudeur","Carreleur","Ferronnier","Vitrier","Tapissier","Froid & Clim","Mécanicien auto","Mécanicien moto","Électronicien","Réparateur tél.","Électroménager","Technicien PC","Couturière","Brodeuse","Cordonnier","Teinturier","Vendeur mode","Photographe","Vidéaste","Graphiste","DJ","Musicien","Monteur vidéo","Motion designer","Community Manager","Copywriter","Cuisinière","Traiteur","Pâtissier","Restaurateur","Maquis","Vendeur de rue","Épicier","Boucher","Fruits & Légumes","Fleuriste","Commercial","Femme de ménage","Repasseuse","Jardinier","Laveur auto","Baby-sitter","Vigile","Chauffeur","Livreur","Aide-soignant","Tradipraticien","Nutritionniste","Kiné","Opticien","Prof particulier","Coach","Traducteur","Développeur","Data analyst","Expert Excel","Chef de projet","Secrétaire","Comptable","Juriste","Architecte","Influenceur","Pharmacie","Quincaillerie","Institut beauté","Pressing","Cybercafé","Librairie","Friperie"];

function fill(el,arr,offset){
  var html="",doubled=arr.concat(arr);
  for(var i=0;i<doubled.length;i++){
    var gold=(i+offset)%2===1;
    html+='<div class="job" style="color:'+(gold?'#E8940A':'#FCE0A8')+'">'+doubled[i]+'</div>';
  }
  el.innerHTML=html;
}
var q=Math.ceil(METIERS.length/3);
var a=METIERS.slice(0,q),b=METIERS.slice(q,2*q),c=METIERS.slice(2*q);
fill(document.getElementById('c1'),a.concat(b),0);
fill(document.getElementById('c2'),c.concat(a).slice().reverse(),1);
fill(document.getElementById('c3'),b.concat(c),0);
document.getElementById('c1').style.animationDuration='34s';
document.getElementById('c2').style.animationDuration='30s';
document.getElementById('c3').style.animationDuration='38s';

var TARGET=new Date('2026-08-15T00:00:00+01:00').getTime();
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  var s=Math.max(0,Math.floor((TARGET-Date.now())/1000));
  document.getElementById('dd').textContent=pad(Math.floor(s/86400));
  document.getElementById('hh').textContent=pad(Math.floor((s%86400)/3600));
  document.getElementById('mm').textContent=pad(Math.floor((s%3600)/60));
  document.getElementById('ss').textContent=pad(s%60);
}
tick(); setInterval(tick,1000);

</script>
</body>
</html>
