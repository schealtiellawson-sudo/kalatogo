<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Agents terrain — WOZALI</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#14100A;color:#FCE0A8;font-family:'Geist',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* LOGIN */
#login-wall{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;}
.login-box{background:#1E180E;border:1px solid rgba(232,148,10,.2);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center;}
.login-logo{font-family:'DM Serif Display',serif;font-style:italic;font-size:32px;color:#E8940A;margin-bottom:4px;}
.login-logo span{font-family:'Geist',sans-serif;font-style:normal;font-size:18px;font-weight:500;color:#FCE0A8;}
.login-sub{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(232,148,10,.6);margin-bottom:28px;}
.login-input{width:100%;background:rgba(252,224,168,.05);border:1px solid rgba(232,148,10,.2);border-radius:10px;padding:13px 16px;color:#FCE0A8;font-size:15px;font-family:'Geist',sans-serif;margin-bottom:12px;outline:none;}
.login-input:focus{border-color:rgba(232,148,10,.5);}
.login-input::placeholder{color:rgba(252,224,168,.3);}
.login-btn{width:100%;background:#E8940A;color:#1A1208;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:'Geist',sans-serif;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:#FFA722;}
.login-err{color:#ff6b6b;font-size:13px;margin-top:10px;min-height:18px;}

/* PANEL */
#panel{display:none;padding:0 0 80px;}
.top-bar{position:sticky;top:0;z-index:50;background:rgba(20,16,10,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(232,148,10,.1);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.top-bar-logo{display:flex;align-items:baseline;gap:3px;}
.top-bar-logo b{font-family:'DM Serif Display',serif;font-style:italic;font-size:24px;color:#E8940A;}
.top-bar-logo span{font-size:13px;font-weight:500;color:#FCE0A8;}
.top-bar-badge{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:rgba(232,148,10,.12);border:1px solid rgba(232,148,10,.25);color:#E8940A;padding:4px 10px;border-radius:12px;}
.logout-btn{font-size:12px;color:rgba(252,224,168,.35);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Geist',sans-serif;}
.logout-btn:hover{color:rgba(252,224,168,.7);}

/* STATS */
.stats-bar{display:flex;gap:12px;padding:20px 24px;overflow-x:auto;}
.stat-card{flex:1;min-width:100px;background:#1E180E;border:1px solid rgba(232,148,10,.1);border-radius:14px;padding:16px 18px;text-align:center;}
.stat-num{font-family:'DM Serif Display',serif;font-size:32px;color:#E8940A;line-height:1;}
.stat-label{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(252,224,168,.4);margin-top:4px;}
.stat-card.attente{border-color:rgba(232,148,10,.25);}
.stat-card.valide{border-color:rgba(39,174,96,.25);}
.stat-card.recale{border-color:rgba(252,224,168,.1);}

/* FILTERS */
.filters{display:flex;gap:8px;padding:0 24px 16px;flex-wrap:wrap;}
.filter-btn{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 16px;border-radius:20px;border:1px solid rgba(232,148,10,.15);background:transparent;color:rgba(252,224,168,.5);cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:rgba(232,148,10,.4);color:#FCE0A8;}
.filter-btn.active{background:rgba(232,148,10,.12);border-color:rgba(232,148,10,.4);color:#E8940A;}

/* SEARCH */
.search-wrap{padding:0 24px 20px;}
.search-input{width:100%;max-width:400px;background:rgba(252,224,168,.04);border:1px solid rgba(232,148,10,.15);border-radius:10px;padding:11px 16px;color:#FCE0A8;font-size:14px;font-family:'Geist',sans-serif;outline:none;}
.search-input:focus{border-color:rgba(232,148,10,.4);}
.search-input::placeholder{color:rgba(252,224,168,.25);}

/* LIST */
.list{padding:0 24px;display:flex;flex-direction:column;gap:12px;}
.empty{text-align:center;padding:60px 24px;color:rgba(252,224,168,.3);font-family:'Geist Mono',monospace;font-size:13px;}

/* CARD */
.card{background:#1E180E;border:1px solid rgba(232,148,10,.1);border-radius:16px;overflow:hidden;transition:border-color .15s;}
.card:hover{border-color:rgba(232,148,10,.2);}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;gap:12px;}
.card-identity{display:flex;align-items:center;gap:14px;}
.card-avatar{width:42px;height:42px;border-radius:50%;background:rgba(232,148,10,.15);border:1px solid rgba(232,148,10,.25);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;color:#E8940A;flex-shrink:0;}
.card-name{font-size:15px;font-weight:700;color:#FCE0A8;margin-bottom:2px;}
.card-meta{font-size:12px;color:rgba(252,224,168,.45);}
.card-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.badge{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:10px;font-weight:700;}
.badge.attente{background:rgba(232,148,10,.1);border:1px solid rgba(232,148,10,.25);color:#E8940A;}
.badge.valide{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);color:#4ade80;}
.badge.recale{background:rgba(252,224,168,.05);border:1px solid rgba(252,224,168,.1);color:rgba(252,224,168,.4);}
.chevron{color:rgba(232,148,10,.4);font-size:14px;transition:transform .2s;}
.card.open .chevron{transform:rotate(180deg);}

/* DETAILS */
.card-details{display:none;padding:0 20px 20px;border-top:1px solid rgba(232,148,10,.08);}
.card.open .card-details{display:block;}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:16px;margin-bottom:20px;}
.detail-item label{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,148,10,.5);display:block;margin-bottom:3px;}
.detail-item span{font-size:14px;color:#FCE0A8;}
.pourquoi-block{background:rgba(252,224,168,.03);border-left:3px solid rgba(232,148,10,.3);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:20px;}
.pourquoi-block p{font-size:14px;color:rgba(252,224,168,.75);line-height:1.7;}

/* ACTION BUTTONS */
.actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn-valider{display:inline-flex;align-items:center;gap:8px;background:#27ae60;color:white;border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;font-family:'Geist',sans-serif;cursor:pointer;transition:background .15s;}
.btn-valider:hover{background:#2ecc71;}
.btn-recaler{display:inline-flex;align-items:center;gap:8px;background:rgba(252,224,168,.07);color:rgba(252,224,168,.6);border:1px solid rgba(252,224,168,.15);border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;font-family:'Geist',sans-serif;cursor:pointer;transition:all .15s;}
.btn-recaler:hover{background:rgba(252,224,168,.12);color:#FCE0A8;border-color:rgba(252,224,168,.3);}
.btn-wa-only{display:inline-flex;align-items:center;gap:8px;background:rgba(37,211,102,.1);color:#25D366;border:1px solid rgba(37,211,102,.25);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;font-family:'Geist',sans-serif;cursor:pointer;transition:all .15s;text-decoration:none;}
.btn-wa-only:hover{background:rgba(37,211,102,.18);}

/* NOTICE */
#notice{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1E180E;border:1px solid rgba(232,148,10,.3);color:#E8940A;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
#notice.show{opacity:1;}

@media(max-width:600px){
  .stats-bar{gap:8px;}
  .stat-card{min-width:80px;padding:12px 10px;}
  .stat-num{font-size:26px;}
  .detail-grid{grid-template-columns:1fr 1fr;}
  .actions{flex-direction:column;}
  .btn-valider,.btn-recaler{justify-content:center;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wall">
  <div class="login-box">
    <div class="login-logo">W<span>OZALI</span></div>
    <div class="login-sub">Admin Agents terrain</div>
    <input class="login-input" id="login-email" type="email" placeholder="Email" autocomplete="email">
    <input class="login-input" id="login-pwd" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Connexion</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- PANEL ADMIN -->
<div id="panel">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:14px;">
      <div class="top-bar-logo"><b>W</b><span>OZALI</span></div>
      <div class="top-bar-badge">Agents terrain — Admin</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <button class="logout-btn" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card attente">
      <div class="stat-num" id="stat-attente">—</div>
      <div class="stat-label">En attente</div>
    </div>
    <div class="stat-card valide">
      <div class="stat-num" id="stat-valide">—</div>
      <div class="stat-label">Validés</div>
    </div>
    <div class="stat-card recale">
      <div class="stat-num" id="stat-recale">—</div>
      <div class="stat-label">Recalés</div>
    </div>
    <div class="stat-card" style="border-color:rgba(232,148,10,.3);background:rgba(232,148,10,.06);">
      <div class="stat-num" id="stat-lome" style="font-size:22px;padding-top:4px;">—</div>
      <div class="stat-label">Validés Lomé</div>
    </div>
    <div class="stat-card" style="border-color:rgba(232,148,10,.3);background:rgba(232,148,10,.06);">
      <div class="stat-num" id="stat-cotonou" style="font-size:22px;padding-top:4px;">—</div>
      <div class="stat-label">Validés Cotonou</div>
    </div>
  </div>

  <!-- KPI COMMISSIONS -->
  <div style="padding:0 24px 20px;">
    <div style="background:#1E180E;border:1px solid rgba(232,148,10,.15);border-radius:16px;padding:20px 24px;">
      <div style="font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(232,148,10,.5);margin-bottom:16px;">Commissions du mois</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
        <div>
          <div style="font-size:12px;color:rgba(252,224,168,.4);margin-bottom:6px;">Membres actifs total</div>
          <input id="kpi-membres" type="number" placeholder="0" style="width:120px;background:rgba(252,224,168,.05);border:1px solid rgba(232,148,10,.2);border-radius:8px;padding:10px 14px;color:#FCE0A8;font-size:18px;font-weight:700;font-family:'Geist',sans-serif;outline:none;" oninput="calcCommission()">
        </div>
        <div>
          <div style="font-size:12px;color:rgba(252,224,168,.4);margin-bottom:6px;">Commission totale à verser</div>
          <div id="kpi-commission" style="font-family:'DM Serif Display',serif;font-style:italic;font-size:36px;color:#E8940A;line-height:1.1;">0 FCFA</div>
        </div>
        <div style="margin-left:auto;">
          <div style="font-size:12px;color:rgba(252,224,168,.4);margin-bottom:6px;">Taux</div>
          <div style="font-size:18px;font-weight:700;color:rgba(252,224,168,.6);">2 000 FCFA / membre</div>
        </div>
      </div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('tous',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('En attente',this)">En attente</button>
    <button class="filter-btn" onclick="setFilter('Validé',this)">Validés</button>
    <button class="filter-btn" onclick="setFilter('Recalé',this)">Recalés</button>
    <button class="filter-btn" onclick="setFilter('Lomé',this)">Lomé</button>
    <button class="filter-btn" onclick="setFilter('Cotonou',this)">Cotonou</button>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="search" placeholder="Chercher par nom, prénom, quartier..." oninput="renderList()">
  </div>

  <div class="list" id="list">
    <div class="empty">Chargement...</div>
  </div>
</div>

<div id="notice"></div>

<script>
const SUPA_URL  = 'https://wikgdksyeygwpmqzmhez.supabase.co';
const SUPA_ANON = 'sb_publishable_sakHYR_n46YFOq4msulssg_ahtXvacU';
const ADMIN_EMAIL = 'schealtiellawson@gmail.com';
const supa = supabase.createClient(SUPA_URL, SUPA_ANON);

let allCandidatures = [];
let currentFilter = 'tous';

// ─── INIT ───────────────────────────────────────────────
async function init() {
  const { data: { session } } = await supa.auth.getSession();
  if (session && session.user.email === ADMIN_EMAIL) {
    showPanel();
    await loadCandidatures();
  } else {
    document.getElementById('login-wall').style.display = 'flex';
  }
}

// ─── AUTH ────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  const err   = document.getElementById('login-err');
  err.textContent = '';
  if (!email || !pwd) { err.textContent = 'Email et mot de passe requis.'; return; }
  const { data, error } = await supa.auth.signInWithPassword({ email, password: pwd });
  if (error) { err.textContent = error.message; return; }
  if (data.user.email !== ADMIN_EMAIL) {
    await supa.auth.signOut();
    err.textContent = 'Accès refusé.';
    return;
  }
  document.getElementById('login-wall').style.display = 'none';
  showPanel();
  await loadCandidatures();
}

async function doLogout() {
  await supa.auth.signOut();
  window.location.reload();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-wall').style.display !== 'none') doLogin();
});

// ─── PANEL ───────────────────────────────────────────────
function showPanel() {
  document.getElementById('panel').style.display = 'block';
}

// ─── LOAD ────────────────────────────────────────────────
async function loadCandidatures() {
  const { data, error } = await supa
    .from('wozali_candidatures_agents_terrain')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('list').innerHTML = `<div class="empty">Erreur : ${error.message}<br><small style="opacity:.5">Vérifie les politiques RLS Supabase.</small></div>`;
    return;
  }
  allCandidatures = data || [];
  renderStats();
  renderList();
}

// ─── STATS ───────────────────────────────────────────────
function renderStats() {
  const valides = allCandidatures.filter(c => c.statut === 'Validé');
  document.getElementById('stat-total').textContent   = allCandidatures.length;
  document.getElementById('stat-attente').textContent = allCandidatures.filter(c => c.statut === 'En attente').length;
  document.getElementById('stat-valide').textContent  = valides.length;
  document.getElementById('stat-recale').textContent  = allCandidatures.filter(c => c.statut === 'Recalé').length;
  document.getElementById('stat-lome').textContent    = valides.filter(c => c.ville === 'Lomé').length;
  document.getElementById('stat-cotonou').textContent = valides.filter(c => c.ville === 'Cotonou').length;
}

// ─── COMMISSION CALC ─────────────────────────────────────
function calcCommission() {
  const membres = parseInt(document.getElementById('kpi-membres').value) || 0;
  const total = membres * 2000;
  document.getElementById('kpi-commission').textContent =
    total.toLocaleString('fr-FR') + ' FCFA';
}

// ─── FILTER ──────────────────────────────────────────────
function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ─── RENDER ──────────────────────────────────────────────
function renderList() {
  const search = (document.getElementById('search').value || '').toLowerCase();
  let list = allCandidatures;

  if (currentFilter === 'Lomé' || currentFilter === 'Cotonou') {
    list = list.filter(c => c.ville === currentFilter);
  } else if (currentFilter !== 'tous') {
    list = list.filter(c => c.statut === currentFilter);
  }

  if (search) {
    list = list.filter(c =>
      (c.prenom + ' ' + c.nom + ' ' + (c.quartier || '') + ' ' + (c.situation || '')).toLowerCase().includes(search)
    );
  }

  if (!list.length) {
    document.getElementById('list').innerHTML = '<div class="empty">Aucune candidature.</div>';
    return;
  }

  document.getElementById('list').innerHTML = list.map(c => renderCard(c)).join('');
}

function renderCard(c) {
  const initials = ((c.prenom||'?')[0] + (c.nom||'?')[0]).toUpperCase();
  const date = c.created_at ? new Date(c.created_at).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' }) : '';
  const statutClass = c.statut === 'Validé' ? 'valide' : c.statut === 'Recalé' ? 'recale' : 'attente';
  const statutLabel = c.statut || 'En attente';

  const actionsHtml = c.statut === 'En attente'
    ? `<button class="btn-valider" onclick="valider('${c.id}','${esc(c.prenom)}','${esc(c.whatsapp)}',event)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        Valider + WhatsApp
      </button>
      <button class="btn-recaler" onclick="recaler('${c.id}','${esc(c.prenom)}','${esc(c.whatsapp)}',event)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Recaler + WhatsApp
      </button>`
    : `<button class="btn-valider" onclick="envoyerMessageAgentTerrain('${esc(c.prenom)}','${esc(c.whatsapp)}',event)" style="background:#E8940A;color:#1A1208;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Message Agent terrain
      </button>
      <a class="btn-recaler" href="https://wa.me/${cleanNum(c.whatsapp)}" target="_blank" rel="noopener" style="text-decoration:none;">WhatsApp libre</a>`;

  return `
<div class="card" id="card-${c.id}">
  <div class="card-head" onclick="toggleCard('${c.id}')">
    <div class="card-identity">
      <div class="card-avatar">${initials}</div>
      <div>
        <div class="card-name">${esc(c.prenom)} ${esc(c.nom)}</div>
        <div class="card-meta">${esc(c.ville || '')}${c.quartier ? ' · ' + esc(c.quartier) : ''} · ${date}</div>
      </div>
    </div>
    <div class="card-right">
      <span class="badge ${statutClass}">${statutLabel}</span>
      <span class="chevron">▾</span>
    </div>
  </div>
  <div class="card-details">
    <div class="detail-grid">
      <div class="detail-item"><label>WhatsApp</label><span>${esc(c.whatsapp || '—')}</span></div>
      <div class="detail-item"><label>Téléphone</label><span>${esc(c.telephone || '—')}</span></div>
      <div class="detail-item"><label>Age</label><span>${c.age || '—'} ans</span></div>
      <div class="detail-item"><label>Genre</label><span>${esc(c.genre || '—')}</span></div>
      <div class="detail-item"><label>Disponibilité</label><span>${esc(c.disponibilite || '—')}</span></div>
      <div class="detail-item"><label>Situation</label><span>${esc(c.situation || '—')}</span></div>
      <div class="detail-item"><label>Transport</label><span>${esc(c.transport || '—')}</span></div>
      <div class="detail-item"><label>Réseau quartier</label><span>${esc(c.reseau_quartier || '—')}</span></div>
      <div class="detail-item"><label>Source</label><span>${esc(c.comment_trouve || '—')}</span></div>
    </div>
    ${c.pourquoi ? `<div class="pourquoi-block"><p>${esc(c.pourquoi)}</p></div>` : ''}
    <div class="actions">${actionsHtml}</div>
  </div>
</div>`;
}

// ─── TOGGLE CARD ─────────────────────────────────────────
function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

// ─── ACTIONS ─────────────────────────────────────────────
async function valider(id, prenom, wa, e) {
  e.stopPropagation();
  await updateStatut(id, 'Validé');
  openWhatsApp(wa, msgValide(prenom));
  toast('Candidature validée');
}

function envoyerMessageAgentTerrain(prenom, wa, e) {
  e.stopPropagation();
  openWhatsApp(wa, msgValide(prenom));
}

async function recaler(id, prenom, wa, e) {
  e.stopPropagation();
  await updateStatut(id, 'Recalé');
  openWhatsApp(wa, msgRecale(prenom));
  toast('Candidature recalée');
}

async function updateStatut(id, statut) {
  const { error } = await supa
    .from('wozali_candidatures_agents_terrain')
    .update({ statut })
    .eq('id', id);
  if (!error) {
    const c = allCandidatures.find(c => c.id === id);
    if (c) c.statut = statut;
    renderStats();
    renderList();
  }
}

// ─── WHATSAPP ────────────────────────────────────────────
function openWhatsApp(number, message) {
  const num = cleanNum(number);
  if (!num) { toast('Numéro WhatsApp manquant'); return; }
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(message)}`, '_blank');
}

function cleanNum(n) {
  if (!n) return '';
  return n.replace(/[\s+\-().]/g, '');
}

function msgValide(prenom) {
  return `${prenom}, c'est Schealtiel. Je suis le fondateur de WOZALI.\n\nJe t'écris personnellement parce que ta candidature m'a parlé.\n\nTu es retenu. Tu fais partie des premiers Agents terrain WOZALI au lancement du 15 août 2026.\n\nCe que tu vas faire dans ton quartier, ça compte vraiment. Pas pour moi, pour les gens autour de toi qui bossent sérieusement et que personne ne trouve encore. C'est eux qu'on va rendre visibles ensemble.\n\nJe t'ajoute dans le groupe maintenant. La suite se passe là-bas.\n\nBienvenue dans l'équipe.`;
}

function msgRecale(prenom) {
  return `Bonjour ${prenom} 🙏\n\nC'est Schealtiel, fondateur de WOZALI.\n\nJ'ai lu ta candidature pour rejoindre les Agents terrain. Pour ce premier groupe, j'ai dû faire des choix difficiles avec très peu de places disponibles.\n\nMais je veux que tu saches : le fait d'avoir postulé compte. Tu fais partie des premières personnes à avoir cru en WOZALI avant même le lancement.\n\nLe 15 août, quand la plateforme ouvre, tu seras parmi les premiers à créer ton profil. La porte n'est pas fermée, elle est juste décalée.\n\nÀ très bientôt.\n— Schealtiel, WOZALI`;
}

// ─── UTILS ───────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const el = document.getElementById('notice');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
